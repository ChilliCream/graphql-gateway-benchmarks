name: Benchmark
run-name: Benchmark #${{ github.run_number }} · ${{ github.run_started_at || 'start-time-unavailable' }}

on:
  workflow_dispatch:
    inputs:
      gateway:
        description: 'Gateway to benchmark'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - apollo-gateway
          - apollo-router
          - cosmo
          - grafbase
          - hive-gateway
          - hive-gateway-router-runtime
          - hive-router
          - hotchocolate
          - hotchocolate-rust
      runs:
        description: 'Number of benchmark runs per gateway'
        required: false
        default: '10'
      duration:
        description: 'Duration per run in seconds'
        required: false
        default: '120'

concurrency:
  group: gateway-benchmarks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      gateways: ${{ steps.build.outputs.gateways }}
    steps:
      - name: Build gateway matrix
        id: build
        env:
          SELECTED_GATEWAY: ${{ inputs.gateway || 'all' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          selected = os.environ.get("SELECTED_GATEWAY", "all")
          aliases = {
              "hc": "hotchocolate",
              "hc-rust": "hotchocolate-rust",
          }
          selected = aliases.get(selected, selected)

          gateways = [
              {"path": "apollo-federation/gateways/apollo-gateway", "name": "apollo-gateway"},
              {"path": "apollo-federation/gateways/apollo-router", "name": "apollo-router"},
              {"path": "apollo-federation/gateways/cosmo", "name": "cosmo"},
              {"path": "apollo-federation/gateways/grafbase", "name": "grafbase"},
              {"path": "apollo-federation/gateways/hive-gateway", "name": "hive-gateway"},
              {
                  "path": "apollo-federation/gateways/hive-gateway-router-runtime",
                  "name": "hive-gateway-router-runtime",
              },
              {"path": "apollo-federation/gateways/hive-router", "name": "hive-router"},
              {
                  "path": "composite-schema/gateways/hotchocolate",
                  "name": "hotchocolate",
                  "subgraphs": "subgraphs-net",
                  "display_name": "hotchocolate (.net subgraphs)",
              },
              {
                  "path": "composite-schema/gateways/hotchocolate",
                  "name": "hotchocolate-rust",
                  "subgraphs": "subgraphs-rust",
              },
          ]

          if selected == "all":
              chosen = gateways
          else:
              chosen = [entry for entry in gateways if entry["name"] == selected]

          if not chosen:
              print(f"Error: no gateway entries match selection {selected!r}", file=sys.stderr)
              sys.exit(1)

          matrix_json = json.dumps(chosen, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"gateways={matrix_json}\n")

          print("Selected gateway entries:")
          for entry in chosen:
              print(f" - {entry['name']}")
          PY

  benchmark-constant:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix:
        gateway: ${{ fromJson(needs.prepare-matrix.outputs.gateways) }}
    runs-on:
      group: benchmarking-1
    name: ${{ matrix.gateway.name }} (constant)
    env:
      BENCH_RUNS: ${{ inputs.runs || '10' }}
      MEASURE_SECONDS: ${{ inputs.duration || '120' }}
    steps:
      - uses: actions/checkout@v4

      - name: Kill stale perfrunner processes
        run: |
          sudo pkill -u perfrunner || true
          sleep 1
          sudo pkill -9 -u perfrunner || true

      - name: Prepare workspace for perfrunner
        run: |
          # Both users need write access during a run:
          # - perfrunner writes dependency artifacts (node_modules, target, etc.)
          # - github-runner writes benchmark outputs (results/, summaries)
          sudo chmod -R a+rX,g+rwX .
          sudo chown -R perfrunner:github-runner .
          # Preserve github-runner as group owner for newly created files/dirs.
          sudo find . -type d -exec chmod g+s {} +

      - name: Run benchmark
        run: ./k6/benchmark.sh ${{ matrix.gateway.path }} ${{ matrix.gateway.subgraphs }} constant
        env:
          BENCH_DISPLAY_NAME: ${{ matrix.gateway.display_name || '' }}

      - name: Kill all perfrunner processes
        if: always()
        run: |
          echo "Killing all perfrunner processes..."
          sudo pkill -u perfrunner || true
          sleep 2
          sudo pkill -9 -u perfrunner || true
          echo "Done."

      - name: Reclaim workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.gateway.name }}-constant
          path: ${{ matrix.gateway.path }}/results/

  benchmark-ramping:
    needs:
      - prepare-matrix
      - benchmark-constant
    if: ${{ always() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        gateway: ${{ fromJson(needs.prepare-matrix.outputs.gateways) }}
    runs-on:
      group: benchmarking-1
    name: ${{ matrix.gateway.name }} (ramping)
    env:
      BENCH_RUNS: ${{ inputs.runs || '10' }}
      MEASURE_SECONDS: ${{ inputs.duration || '120' }}
    steps:
      - uses: actions/checkout@v4

      - name: Kill stale perfrunner processes
        run: |
          sudo pkill -u perfrunner || true
          sleep 1
          sudo pkill -9 -u perfrunner || true

      - name: Prepare workspace for perfrunner
        run: |
          # Both users need write access during a run:
          # - perfrunner writes dependency artifacts (node_modules, target, etc.)
          # - github-runner writes benchmark outputs (results/, summaries)
          sudo chmod -R a+rX,g+rwX .
          sudo chown -R perfrunner:github-runner .
          # Preserve github-runner as group owner for newly created files/dirs.
          sudo find . -type d -exec chmod g+s {} +

      - name: Run benchmark
        run: ./k6/benchmark.sh ${{ matrix.gateway.path }} ${{ matrix.gateway.subgraphs }} ramping
        env:
          BENCH_DISPLAY_NAME: ${{ matrix.gateway.display_name || '' }}

      - name: Kill all perfrunner processes
        if: always()
        run: |
          echo "Killing all perfrunner processes..."
          sudo pkill -u perfrunner || true
          sleep 2
          sudo pkill -9 -u perfrunner || true
          echo "Done."

      - name: Reclaim workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.gateway.name }}-ramping
          path: ${{ matrix.gateway.path }}/results/

  generate-results-constant:
    needs: benchmark-constant
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          pattern: results-*-constant
          path: artifacts/

      - name: Generate constant result document
        run: python3 k6/generate-results.py artifacts/ .

      - name: Write constant summary
        run: |
          echo "# Benchmark Results (Constant)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f RESULTS_CONSTANT.md ]]; then
            cat RESULTS_CONSTANT.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No constant results were generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit constant results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RESULTS_CONSTANT.md
          git diff --cached --quiet || git commit -m "Update constant benchmark results"
          git push

  generate-results-ramping:
    needs:
      - benchmark-ramping
      - generate-results-constant
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          pattern: results-*-ramping
          path: artifacts/

      - name: Generate ramping result document
        run: python3 k6/generate-results.py artifacts/ .

      - name: Write ramping summary
        run: |
          echo "# Benchmark Results (Ramping)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f RESULTS_RAMPING.md ]]; then
            cat RESULTS_RAMPING.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No ramping results were generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit ramping results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RESULTS_RAMPING.md
          git diff --cached --quiet || git commit -m "Update ramping benchmark results"
          git push

  benchmark-summary:
    needs:
      - generate-results-constant
      - generate-results-ramping
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Write final benchmark summary
        run: |
          echo "# Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run: **Benchmark #${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Started (UTC): **${{ github.run_started_at || 'start-time-unavailable' }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Gateway selection: \`${{ inputs.gateway || 'all' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Runs per gateway: \`${{ inputs.runs || '10' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Duration per run: \`${{ inputs.duration || '120' }}s\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ -f RESULTS_CONSTANT.md ]]; then
            cat RESULTS_CONSTANT.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "No constant results were generated." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -f RESULTS_RAMPING.md ]]; then
            cat RESULTS_RAMPING.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No ramping results were generated." >> $GITHUB_STEP_SUMMARY
          fi
