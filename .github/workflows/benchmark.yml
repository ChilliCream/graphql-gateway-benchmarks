name: Benchmark

on:
  workflow_dispatch:
    inputs:
      gateway:
        description: 'Gateway to benchmark'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - apollo-gateway
          - apollo-router
          - cosmo
          - grafbase
          - hive-gateway
          - hive-gateway-router-runtime
          - hive-router
          - hotchocolate
          - hotchocolate-rust
      runs:
        description: 'Number of benchmark runs per gateway'
        required: false
        default: '10'
      duration:
        description: 'Duration per run in seconds'
        required: false
        default: '120'

concurrency:
  group: gateway-benchmarks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        gateway:
          - path: apollo-federation/gateways/apollo-gateway
            name: apollo-gateway
          - path: apollo-federation/gateways/apollo-router
            name: apollo-router
          - path: apollo-federation/gateways/cosmo
            name: cosmo
          - path: apollo-federation/gateways/grafbase
            name: grafbase
          - path: apollo-federation/gateways/hive-gateway
            name: hive-gateway
          - path: apollo-federation/gateways/hive-gateway-router-runtime
            name: hive-gateway-router-runtime
          - path: apollo-federation/gateways/hive-router
            name: hive-router
          - path: composite-schema/gateways/hotchocolate
            name: hotchocolate
            display_name: "hotchocolate (.net subgraphs)"
          - path: composite-schema/gateways/hotchocolate
            name: hotchocolate-rust
            subgraphs: subgraphs-rust
        mode:
          - constant
          - ramping
    runs-on:
      group: benchmarking-1
    name: ${{ matrix.gateway.name }} (${{ matrix.mode }})
    env:
      BENCH_RUNS: ${{ inputs.runs || '10' }}
      MEASURE_SECONDS: ${{ inputs.duration || '120' }}
    steps:
      - name: Skip if gateway not selected
        id: check
        run: |
          if [[ "${{ inputs.gateway || 'all' }}" == "all" || "${{ inputs.gateway }}" == "${{ matrix.gateway.name }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.gateway.name }} (not selected)"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - name: Kill stale perfrunner processes
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo pkill -u perfrunner || true
          sleep 1
          sudo pkill -9 -u perfrunner || true

      - name: Prepare workspace for perfrunner
        if: steps.check.outputs.skip != 'true'
        run: |
          # Both users need write access during a run:
          # - perfrunner writes dependency artifacts (node_modules, target, etc.)
          # - github-runner writes benchmark outputs (results/, summaries)
          sudo chmod -R a+rX,g+rwX .
          sudo chown -R perfrunner:github-runner .
          # Preserve github-runner as group owner for newly created files/dirs.
          sudo find . -type d -exec chmod g+s {} +

      - name: Run benchmark
        if: steps.check.outputs.skip != 'true'
        run: ./k6/benchmark.sh ${{ matrix.gateway.path }} ${{ matrix.gateway.subgraphs }} ${{ matrix.mode }}
        env:
          BENCH_DISPLAY_NAME: ${{ matrix.gateway.display_name || '' }}

      - name: Kill all perfrunner processes
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          echo "Killing all perfrunner processes..."
          sudo pkill -u perfrunner || true
          sleep 2
          sudo pkill -9 -u perfrunner || true
          echo "Done."

      - name: Reclaim workspace ownership
        if: always() && steps.check.outputs.skip != 'true'
        run: sudo chown -R $(id -u):$(id -g) .

      - name: Upload results
        if: always() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.gateway.name }}-${{ matrix.mode }}
          path: ${{ matrix.gateway.path }}/results/

  generate-results:
    needs: benchmark
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: artifacts/

      - name: Generate result documents
        run: python3 k6/generate-results.py artifacts/ .

      - name: Write job summary
        run: |
          echo "# Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat RESULTS_CONSTANT.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat RESULTS_RAMPING.md >> $GITHUB_STEP_SUMMARY

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RESULTS_CONSTANT.md RESULTS_RAMPING.md
          git diff --cached --quiet || git commit -m "Update benchmark results"
          git push
